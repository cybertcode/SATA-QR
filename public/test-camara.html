<!DOCTYPE html>
<html>
<head>
    <title>SATA-QR: TEST DE CÁMARA</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        video { width: 100%; max-width: 500px; border: 5px solid #333; border-radius: 10px; background: black; }
        #status { padding: 20px; margin: 20px; border-radius: 5px; font-weight: bold; }
        .ok { background: #2ecc71; color: white; }
        .err { background: #e74c3c; color: white; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>PRUEBA DE AISLAMIENTO DE CÁMARA</h1>
    <div id="status">ESTADO: ESPERANDO INTERACCIÓN</div>
    <button onclick="probarCamara()">PROBAR CÁMARA AHORA</button>
    <br><br>
    <video id="video" autoplay playsinline></video>

    <script>
        function log(msg, type) {
            const s = document.getElementById('status');
            s.innerText = "ESTADO: " + msg;
            s.className = type;
        }

        async function probarCamara() {
            log("SOLICITANDO CÁMARA...", "");
            
            // VERIFICACIÓN 1: ¿Existe la función en el navegador?
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log("FALLO CRÍTICO: Tu navegador bloqueó la cámara por INSEGURIDAD. Usa LOCALHOST o HTTPS.", "err");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                log("¡ÉXITO! LA CÁMARA ESTÁ FUNCIONANDO", "ok");
            } catch (err) {
                log("ERROR: " + err.name + " - " + err.message, "err");
                console.error(err);
            }
        }
    </script>
</body>
</html>
